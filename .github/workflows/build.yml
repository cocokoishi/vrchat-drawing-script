- name: Create distribution package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item "target\release\vrchat_drawing_tool.exe" -Destination "package\"
          
          Copy-Item "images\*" -Destination "package\" -Recurse 
          
          Compress-Archive -Path "package\*" -DestinationPath "vrchat-drawing-tool-windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrchat-drawing-tool-windows
          path: package/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vrchat-drawing-tool-windows.zip
          generate_release_notes: true