name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Create distribution package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item target\release\vrchat_drawing_tool.exe -Destination package\
          if (Test-Path images) { Copy-Item images\* -Destination package\ -Recurse }
          Compress-Archive -Path package\* -DestinationPath vrchat-drawing-tool-windows.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vrchat-drawing-tool-windows
          path: package/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: vrchat-drawing-tool-windows.zip
          generate_release_notes: true